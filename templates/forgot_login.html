<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - NetIDS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{url_for('static', filename='css/style.css')}}" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .split-layout {
            display: flex;
            min-height: 100vh;
        }
        .split-left {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1510511459019-5d1380969ce7?auto=format&fit=crop&q=80&w=1000') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }
        .split-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-white);
            padding: 2rem;
        }
        .overlay-graphic {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 75, 75, 0.15), transparent 60%);
            pointer-events: none;
        }
        @media (max-width: 991px) {
            .split-left { display: none; }
        }
    </style>
</head>
<body> 
    
    <div class="split-layout">
        <!-- Visual Side -->
        <div class="split-left">
            <div class="overlay-graphic"></div>
            <div style="z-index: 1;">
                <div class="d-inline-flex align-items-center justify-content-center bg-white p-3 rounded mb-4" style="border: 1px solid var(--danger);">
                    <i class="fa-solid fa-key text-danger fs-1"></i>
                </div>
                <h1 class="display-4 fw-bold text-dark mb-3">Security Override</h1>
                <p class="lead text-black opacity-75 mb-5">Establish a new cryptographic key for your administrative account. Ensure you choose a strong sequence.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="split-right">
            <div class="auth-container w-100 animate-fade-in" style="max-width: 450px;">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-dark">Reset Credentials</h2>
                    <p style="color: #000000;">Configure your new security pass</p>
                </div>

                <form action="{{url_for('reset_password')}}" method="POST">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark tracking-wide text-uppercase">System Username</label>
                        <input type="text" name="username" class="form-control bg-white text-dark" style="border-color: rgba(0,0,0,0.1);" placeholder="Your username" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark tracking-wide text-uppercase">New Key</label>
                        <input type="password" name="new_password" class="form-control bg-white text-dark" style="border-color: rgba(0,0,0,0.1);" placeholder="Enter new password" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark tracking-wide text-uppercase">Confirm New Key</label>
                        <input type="password" name="re_new_password" class="form-control bg-white text-dark" style="border-color: rgba(0,0,0,0.1);" placeholder="Confirm new password" required>
                    </div>

                    {% if message %}
                    <div class="alert alert-info bg-white text-info border border-info py-3 small mb-4 fw-bold">
                        {{message}}
                    </div>
                    {% endif %}

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-outline-glow py-3 fs-5" style="border-color: var(--danger); color: var(--danger);">
                            Execute Override
                        </button>
                    </div>
                </form>

                <div class="text-center mt-5">
                    <a href="{{url_for('login')}}" class="fw-bold text-dark text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Cancel & Return</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
