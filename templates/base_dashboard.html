<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - NetIDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{url_for('static', filename='css/style.css')}}?v=1.1" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="{{url_for('static', filename='js/jquery-3.6.0.min.js')}}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-white text-dark">

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar animate-fade-in">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                NetIDS
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                        <i class="fa-solid fa-chart-line" style="width: 20px;"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('input') }}" class="nav-link {% if request.endpoint in ['input', 'process'] %}active{% endif %}">
                        <i class="fa-solid fa-play" style="width: 20px;"></i> Start Training
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('monitor') }}" class="nav-link {% if request.endpoint == 'monitor' %}active{% endif %}">
                        <i class="fa-solid fa-satellite-dish" style="width: 20px;"></i> Live Monitor
                    </a>
                </li>

                <li class="nav-item mt-2">
                    <a href="{{ url_for('reset') }}" class="nav-link" style="color: #ff4b4b;">
                        <i class="fa-solid fa-rotate-left" style="width: 20px;"></i> Reset Monitoring
                    </a>
                </li>
                
                <li class="nav-item mt-4 pt-4 border-top" style="border-color: var(--border-color) !important;">
                    <a href="{{ url_for('profile') }}" class="nav-link {% if request.endpoint == 'profile' %}active{% endif %}">
                        <i class="fa-solid fa-user" style="width: 20px;"></i> Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('logout') }}" class="nav-link text-danger">
                        <i class="fa-solid fa-right-from-bracket" style="width: 20px;"></i> Logout
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content animate-fade-in" style="animation-delay: 0.1s;">
            <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: var(--border-color) !important;">
                <h2 class="h3 fw-bold mb-0 text-black">{% block header_title %}Overview{% endblock %}</h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-black small"><i class="fa-regular fa-clock me-1"></i> Live</span>
                    <div class="rounded-circle bg-primary" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        <i class="fa-solid fa-user text-dark small"></i>
                    </div>
                </div>
            </header>

            {% if error %}
                <div class="alert alert-danger bg-danger text-dark border-0 py-2 small mb-4">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
                </div>
            {% endif %}
            
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
